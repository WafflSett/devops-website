name: Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # lehetővé teszi, hogy "kézzel" elindítsam a folyamatot
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: generate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV

    - uses: actions/checkout@v4
    - name: Checkout repository
      run: | 
        docker build . --file Dockerfile  --tag ghcr.io/wafflsett/k8s-cicd-test:$IMAGE_TAG
        docker login ghcr.io -u wafflsett -p ${{ secrets.GHCR_TOKEN }}
        docker push ghcr.io/wafflsett/k8s-cicd-test:$IMAGE_TAG
        sed -i 's|image: ghct.io/wafflsett/k8s-cicd-test:.*|image: ghcr.io/wafflsett/k8s-cicd-test:'"IMAGE_TAG"'|' deployment.yaml

